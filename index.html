<!DOCTYPE html>

  <title>Delete Your OstoraGo Account</title>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;

      padding: 20px;
      line-height: 1.6;

      background: #f4f4f4;

<h1>Delete Your OstoraGo Account</h1>

<p>If you want to delete your account, email us:</p>

<div class="box">
  <b>Email:</b> contact@ostora.eu <br>
  <b>Subject:</b> Delete My Account
</div>

<h2>What to include</h2>
<ul>
  <li>Your name</li>
  <li>Your registered email</li>
</ul>

<h2>What will be deleted</h2>
<ul>
  <li>Account data</li>
  <li>Chats</li>
  <li>Listings</li>
</ul>

<h2>Timeframe</h2>
<p>We process deletion within 7 days.</p>

</body>
